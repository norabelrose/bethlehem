<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Star of Bethlehem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --gold: #f0c060;
    --gold-dim: #a07830;
    --cream: #f5e8c8;
    --deep-blue: #050a1a;
    --mid-blue: #0a1535;
    --nebula: #1a2a5a;
    --text: #e8d5a0;
    --dim: #8a7050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-blue);
    color: var(--text);
    font-family: 'Crimson Text', serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 4rem; /* space for fixed footer */
  }

  h1, h2, h3, .label, .event-title {
    font-family: 'Cinzel', serif;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
  }
  header h1 {
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(240,192,96,0.5);
  }
  header p {
    font-size: 1.1rem;
    color: var(--dim);
    margin-top: 0.4rem;
    font-style: italic;
  }

  #main-layout {
    display: flex;
    align-items: stretch;
    gap: 1.5rem;
    max-width: 1200px;
    width: 100%;
    flex: 1;
    min-height: 0;
    margin: 1rem auto 0;
    padding: 0 1rem;
  }

  #left-col {
    flex: 1;
    min-width: 0;
    min-height: 0;
    overflow-y: auto;
  }

  #right-sidebar {
    width: 300px;
    flex-shrink: 0;
    border: 1px solid rgba(240,192,96,0.12);
    border-radius: 4px;
    background: rgba(10,21,53,0.4);
    padding: 0.8rem 0;
    overflow-y: auto;
  }

  #right-sidebar h2 {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-transform: uppercase;
    padding: 0 1rem 0.6rem;
    border-bottom: 1px solid rgba(240,192,96,0.1);
    margin-bottom: 0.5rem;
  }

  #sky-wrap {
    position: relative;
    width: 100%;
  }
  canvas#sky {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid rgba(240,192,96,0.15);
    border-radius: 4px;
  }

  #controls {
    margin: 1.2rem 0 0;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  #controls label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }
  #timeline {
    flex: 1;
    min-width: 200px;
    -webkit-appearance: none;
    height: 3px;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct, 0%), var(--nebula) var(--pct, 0%), var(--nebula) 100%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #timeline::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(240,192,96,0.8);
    cursor: pointer;
  }
  #timeline::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    box-shadow: 0 0 8px rgba(240,192,96,0.8);
  }
  #btn-play {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 1.1rem;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  #btn-play:hover { background: rgba(240,192,96,0.12); }

  #speed-wrap {
    display: flex; align-items: center; gap: 0.5rem;
  }
  #speed {
    -webkit-appearance: none;
    width: 80px; height: 3px;
    background: var(--nebula);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speed::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold-dim);
    cursor: pointer;
  }

  /* Toggle panel */
  #toggle-panel {
    margin: 1rem 0 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  .tog-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    user-select: none;
    background: transparent;
  }

  .tog-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    transition: opacity 0.25s;
  }

  .tog-btn.active { opacity: 1; }
  .tog-btn:not(.active) { opacity: 0.35; }
  .tog-btn:hover { opacity: 1; }

  .tog-ecliptic { border: 1px solid rgba(68,221,102,0.4); color: #88eea0; }
  .tog-ecliptic .dot { background: #44dd66; box-shadow: 0 0 4px #44dd66; }
  .tog-lines { border: 1px solid rgba(150,170,220,0.3); color: #a0b4dd; }
  .tog-lines .dot { background: #7090cc; box-shadow: 0 0 4px #7090cc; }
  .tog-labels { border: 1px solid rgba(240,220,160,0.3); color: #d0c080; }
  .tog-labels .dot { background: #ddc880; }
  .tog-sun { border: 1px solid rgba(255,224,80,0.3); color: #ffe060; }
  .tog-sun .dot { background: #ffe060; box-shadow: 0 0 6px #ffe060; }
  .tog-moon { border: 1px solid rgba(200,216,240,0.3); color: #c0d0ee; }
  .tog-moon .dot { background: #c8d8f0; }
  .tog-planets { border: 1px solid rgba(255,215,0,0.3); color: #ffd700; }
  .tog-planets .dot { background: #ffd700; box-shadow: 0 0 4px #ffd700; }

  .tog-sep {
    width: 1px; height: 22px;
    background: rgba(240,192,96,0.15);
    margin: 0 0.2rem;
  }

  #event-panel {
    margin: 1.4rem 0 0;
    min-height: 110px;
  }
  .event-card {
    background: rgba(10,21,53,0.7);
    border-left: 3px solid var(--gold);
    padding: 1rem 1.4rem;
    border-radius: 0 4px 4px 0;
  }
  .event-card .event-date {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .event-card .event-title {
    font-size: 1.25rem;
    color: var(--cream);
    margin-bottom: 0.35rem;
  }
  .event-card .event-desc {
    font-size: 1rem;
    color: var(--dim);
    line-height: 1.55;
    font-style: italic;
  }

  #event-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.4rem;
    padding: 0 0.6rem;
  }
  .ev-item {
    border: 1px solid rgba(240,192,96,0.15);
    padding: 0.7rem 1rem;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .ev-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }
  .ev-item:hover::before, .ev-item.active::before { transform: scaleY(1); }
  .ev-item:hover, .ev-item.active {
    border-color: rgba(240,192,96,0.4);
    background: rgba(240,192,96,0.06);
  }
  .ev-item .ei-date {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    margin-bottom: 0.2rem;
  }
  .ev-item .ei-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--cream);
  }

  #legend {
    position: absolute;
    bottom: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    background: rgba(5,10,26,0.6);
    padding: 0.5rem 0.7rem;
    border-radius: 3px;
    border: 1px solid rgba(240,192,96,0.08);
  }
  .leg { display: flex; align-items: center; gap: 0.45rem; font-size: 0.9rem; color: var(--dim); }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 0.6rem 1.5rem;
    font-size: 0.85rem;
    color: var(--dim);
    font-style: italic;
    border-top: 1px solid rgba(240,192,96,0.1);
    background: rgba(5,10,26,0.92);
    backdrop-filter: blur(4px);
  }


</style>

// t = day index: 0 = 1 Jan 3 BC, 365 = 1 Jan 2 BC
const EVENTS = [
  { t:206, date:"26 Jul 3 BC \u2014 before sunrise", title:"\u{1F315} 1st Heliacal Rising of Jupiter",
    desc:"On a full moon, Jupiter emerges from behind the Sun and becomes visible for the first time before dawn \u2014 its heliacal rising. The Magi allude to the heliacal rising in Matthew 2:2, saying \u201cwe saw his star at its rising (ἐν τῇ ἀνατολῇ).\u201d When Herod asks for \u201cthe exact time the star had appeared\u201d (Matthew 2:7), the Magi give him this date. About one year and four months elapse between the heliacal rising and the Magi's visit to the Holy Family. Herod rounds this figure up to two years when he orders the Slaughter of the Innocents, in order to ensure he eliminates the Christ child (Matthew 2:16).",
    highlight:["jupiter"] },
  { t:221, date:"10 Aug 3 BC \u2014 before sunrise", title:"\u{1F312} Jupiter\u2013Venus Conjunction",
    desc:"On the first day of the lunar month of Elul, with the moon in its first visible crescent phase, Jupiter and Venus converge to within 4.3 arcminutes in the morning sky, in the constellation of Leo. They are so close that they nearly appear as a single object to the naked eye. This is the first time an approach of less than 5 arcminutes had been seen in several centuries.",
    highlight:["jupiter","venus"] },
  { t:251, date:"9 Sep 3 BC \u2014 after sunset", title:"\u{1F312} Virgo Clothed with the Sun: 1st Day of Rosh Hashanah",
    desc:"John says \u201cA great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet and a crown of twelve stars on her head\u201d (Rev. 12:1). This sign appeared on 9 Sept 3 BC, when the Sun clothed the body of Virgo, and the crescent New Moon rested just beneath her feet, ~90 min after sunset. It was 1 Tishrei on the Jewish calendar, the first day of the Rosh Hashanah new year festival, also known as the Day of Trumpets.",
    highlight:["sun","moon","virgo"] },
  { t:253, date:"11 Sep 3 BC \u2014 before sunset", title:"\u{1F312} 1st Jupiter\u2013Regulus Conjunction: 2nd Day of Rosh Hashanah",

function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function easeInOut(t){t=clamp(t,0,1);return t<.5?2*t*t:-1+(4-2*t)*t}

const BG_STARS=[];
(function(){let s=0;function r(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}
for(let i=0;i<300;i++)BG_STARS.push({x:r(),y:r()*0.88+0.02,r:r()*1.4+0.3,b:r()*0.6+0.3})})();

// COORDINATE MAPPING  (RA/Dec → canvas fraction)
// View: RA 6h–17h (east→left), Dec -30°–+40°
// ═══════════════════════════════════════════════
const RA_MIN=6, RA_MAX=17, DEC_MIN=-30, DEC_MAX=40;
function sky(ra,dec){
  return{x:(RA_MAX-ra)/(RA_MAX-RA_MIN),
         y:(DEC_MAX-dec)/(DEC_MAX-DEC_MIN)};
}
function inFrame(p){return p.x>=0&&p.x<=1&&p.y>=0&&p.y<=1;}

function S(ra,dec,r,name){const p=sky(ra,dec);return name?{x:p.x,y:p.y,r,name}:{x:p.x,y:p.y,r};}

function buildVirgo(vs){
  // Apparent coords from Skyfield at Jul 2 BC; sizes reflect visual magnitude
  const cfg=[
    ["spica",        5.5,"Spica"],
    ["zavijava",     2.5,null],
    ["porrima",      3.5,"Porrima"],
    ["auva",         2.5,null],
    ["vindemiatrix", 3.0,"Vindemiatrix"],
    ["heze",         2.5,null],
    ["zaniah",       2.5,null],
    ["syrma",        2.0,null],
    ["mu_vir",       2.0,null],
    ["tau_vir",      2.0,null],
    ["109_vir",      2.5,null],
  ];
  CONST_VIRGO.stars=cfg.map(([key,r,name])=>{
    const{ra,dec}=vs[key];const p=sky(ra,dec);
    return name?{x:p.x,y:p.y,r,name}:{x:p.x,y:p.y,r};
  });
}

function buildHydra(hs){
  const cfg=[
    ["delta_hya",   2.0, null],
    ["sigma_hya",   1.8, null],
    ["eta_hya",     2.0, null],
    ["epsilon_hya", 3.0, null],
    ["rho_hya",     2.0, null],
    ["zeta_hya",    3.0, null],
    ["theta_hya",   2.5, null],
    ["iota_hya",    2.5, null],
    ["alphard",     5.0, "Alphard"],
    ["lambda_hya",  2.5, null],
    ["mu_hya",      2.5, null],
    ["nu_hya",      3.0, null],

    ["beta_hya",    2.0, null],
    ["gamma_hya",   3.5, null],
    ["pi_hya",      3.0, null],
  ];
  CONST_HYDRA.stars=cfg.map(([key,r,name])=>{
    const{ra,dec}=hs[key];const p=sky(ra,dec);
    return name?{x:p.x,y:p.y,r,name}:{x:p.x,y:p.y,r};
  });
}

function getPos(name,dayIdx){
  if(!EPH||!EPH.bodies[name])return{x:0.5,y:0.5};
  const body=EPH.bodies[name];
  const n=body.ra.length;
  const i=Math.max(0,Math.min(Math.floor(dayIdx),n-2));
  const f=dayIdx-Math.floor(dayIdx);
  let ra0=body.ra[i],ra1=body.ra[i+1];
  if(ra1-ra0>12)ra1-=24; // handle RA wrap-around
  if(ra0-ra1>12)ra1+=24;
  const ra=ra0+(ra1-ra0)*f;
  const dec=body.dec[i]+(body.dec[i+1]-body.dec[i])*f;
  return sky(ra,dec);
}

function currentDate(dayIdx){
  if(!EPH)return '';
  return EPH.dates[Math.max(0,Math.min(Math.round(dayIdx),EPH.dates.length-1))];
}

const canvas=document.getElementById('sky');
const ctx=canvas.getContext('2d');
const W=900,H=500;

// ── Background ──
function drawBg(){
  const g=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.6);
  g.addColorStop(0,'#0b1530');g.addColorStop(1,'#020710');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Milky way
  const mw=ctx.createLinearGradient(W*.7,0,W*.15,H);
  mw.addColorStop(0,'rgba(80,100,160,0)');
  mw.addColorStop(0.35,'rgba(90,110,170,0.05)');
  mw.addColorStop(0.5,'rgba(100,120,180,0.07)');
  mw.addColorStop(0.65,'rgba(90,110,170,0.05)');
  mw.addColorStop(1,'rgba(80,100,160,0)');
  ctx.fillStyle=mw;ctx.fillRect(0,0,W,H);

  BG_STARS.forEach(s=>{
    const tw=0.7+0.3*Math.sin(Date.now()*0.001*s.b*2+s.x*20);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r*tw,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.b*tw*0.8})`;ctx.fill();
  });
}

// ── Ecliptic ──
function drawEcliptic(){
  if(!show.ecliptic)return;
  ctx.save();

  // In the new coordinate system (RA 6h–17h right→left, Dec -30°–+40° top→bottom)
  // the ecliptic runs from upper-right (RA~6h, Dec~+23°) to lower-left (RA~17h, Dec~-29°)
  // Computed from solar Dec at key RA positions along the ecliptic
  ctx.beginPath();
  ctx.moveTo(W,    H*0.24); // RA 6h,  Dec +23°
  ctx.bezierCurveTo(
    W*0.82, H*0.31,
    W*0.64, H*0.47,
    W*0.46, H*0.60  // RA ~12h, Dec ~-2°
  );
  ctx.bezierCurveTo(
    W*0.28, H*0.73,
    W*0.10, H*0.89,
    0,      H*1.00  // RA 17h, Dec ~-29°
  );

  ctx.strokeStyle='rgba(68,221,102,0.07)';
  ctx.lineWidth=16;
  ctx.stroke();
  ctx.strokeStyle='rgba(68,221,102,0.50)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Zodiac label ticks at approximate RA positions
  const ticks=[
    {l:'LEO',    x:W*0.71, y:H*0.45},
    {l:'VIRGO',  x:W*0.50, y:H*0.58},
  ];
  ctx.font='9px Cinzel, serif';
  ticks.forEach(m=>{
    ctx.fillStyle='rgba(68,221,102,0.35)';
    ctx.fillText(m.l, m.x-6, m.y-10);
    ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);
    ctx.fillStyle='rgba(68,221,102,0.25)';ctx.fill();
  });

  ctx.save();
  ctx.translate(W*0.93,H*0.27);ctx.rotate(0.52);
  ctx.font='600 9px Cinzel, serif';
  ctx.fillStyle='rgba(68,221,102,0.40)';
  ctx.fillText('Ecliptic',0,0);
  ctx.restore();

  ctx.restore();
}

// ── Constellation Art ──

// ── Constellation lines + stars ──
function drawConst(c,alpha){
  if(alpha<=0)return;
  ctx.save();

  if(show.lines){
    ctx.globalAlpha=alpha*0.5;
    ctx.strokeStyle='rgba(150,170,220,0.4)';
    ctx.lineWidth=0.8;ctx.setLineDash([3,5]);
    c.lines.forEach(([a,b])=>{
      ctx.beginPath();ctx.moveTo(c.stars[a].x*W,c.stars[a].y*H);
      ctx.lineTo(c.stars[b].x*W,c.stars[b].y*H);ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // Stars always visible
  ctx.globalAlpha=alpha;
  c.stars.forEach(s=>{
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle='#fff5e0';ctx.fill();
    if(s.name){
      const gw=ctx.createRadialGradient(s.x*W,s.y*H,0,s.x*W,s.y*H,s.r*5);
      gw.addColorStop(0,'rgba(255,240,200,0.4)');gw.addColorStop(1,'rgba(255,240,200,0)');
      ctx.fillStyle=gw;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r*5,0,Math.PI*2);ctx.fill();
      if(show.labels){
        ctx.fillStyle='rgba(240,220,160,0.85)';ctx.font='600 11px Cinzel, serif';
        ctx.fillText(s.name,s.x*W+s.r+4,s.y*H-s.r-2);
      }
    }
  });

  if(show.labels){
    const cx2=c.stars.reduce((a,s)=>a+s.x,0)/c.stars.length;
    const cy2=c.stars.reduce((a,s)=>a+s.y,0)/c.stars.length;
    ctx.fillStyle='rgba(150,170,220,0.5)';ctx.font='600 13px Cinzel, serif';
    ctx.textAlign='center';ctx.fillText(c.name,cx2*W,cy2*H+50);ctx.textAlign='left';
  }
  ctx.restore();
}

// ── Celestial bodies ──
function drawPlanet(name,t,cfg){
  if(!show.planets)return null;
  const p=getPos(name,t);if(!inFrame(p))return null;const px=p.x*W,py=p.y*H;
  const{color,r,glowColor,glowR,label}=cfg;

  const g=ctx.createRadialGradient(px,py,0,px,py,glowR||r*6);
  g.addColorStop(0,glowColor||color);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(px,py,glowR||r*6,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();

  if(label&&show.labels){
    ctx.save();ctx.fillStyle='rgba(220,200,140,0.7)';ctx.font='10px Cinzel, serif';
    ctx.fillText(label,px+r+4,py-r);ctx.restore();
  }
  return{px,py};
}

function drawSun(t){
  if(!show.sun)return;
  const p=getPos('sun',t);if(!inFrame(p))return;const px=p.x*W,py=p.y*H;const r=20;

  ctx.save();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2+Date.now()*0.0003;
    const r1=r+4,r2=r+14+Math.sin(i*1.7+Date.now()*0.001)*4;
    ctx.beginPath();ctx.moveTo(px+Math.cos(a)*r1,py+Math.sin(a)*r1);
    ctx.lineTo(px+Math.cos(a)*r2,py+Math.sin(a)*r2);
    ctx.strokeStyle='rgba(255,220,80,0.3)';ctx.lineWidth=2;ctx.stroke();
  }
  const g1=ctx.createRadialGradient(px,py,0,px,py,r*4);
  g1.addColorStop(0,'rgba(255,255,180,0.35)');g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(px,py,r*4,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  const g2=ctx.createRadialGradient(px-r*.2,py-r*.2,0,px,py,r);
  g2.addColorStop(0,'#ffffcc');g2.addColorStop(.5,'#ffe060');g2.addColorStop(1,'#ff9900');
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.restore();

  if(show.labels){ctx.fillStyle='rgba(255,230,120,0.7)';ctx.font='10px Cinzel, serif';ctx.fillText('Sun',px+r+3,py-r);}
}

function drawMoon(t){
  if(!show.moon)return;
  const p=getPos('moon',t);if(!inFrame(p))return;const px=p.x*W,py=p.y*H;const r=9;

  // Phase from exported data
  let f=0.5,waxing=true;
  if(EPH&&EPH.moon_phase){
    const ti=Math.max(0,Math.min(Math.round(t),EPH.moon_phase.length-1));
    f=EPH.moon_phase[ti];
    const ti2=Math.min(ti+1,EPH.moon_phase.length-1);
    waxing=EPH.moon_phase[ti2]>=f;
  }

  // Eclipse effect (Jan 8 1 BC, t≈737)
  const eclipseA=Math.max(0,1-Math.abs(t-737));
  const moonColor=eclipseA>0
    ?`rgba(${Math.round(200+55*eclipseA)},${Math.round(220*(1-eclipseA*0.8))},${Math.round(255*(1-eclipseA))},1)`
    :'#c8d8f0';
  const glowColor=eclipseA>0
    ?`rgba(220,60,20,${0.35*eclipseA})`
    :'rgba(200,220,255,0.25)';

  // Glow halo
  const g=ctx.createRadialGradient(px,py,0,px,py,r*5);
  g.addColorStop(0,glowColor);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(px,py,r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  ctx.save();
  // Clip everything to the moon disk
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.clip();

  // Dark background
  ctx.fillStyle='#060e24';
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();

  // Phase rendering: lit semicircle (pie slice from centre) + terminator ellipse overlay.
  // ex = half-width of terminator ellipse = r*|1-2f|
  // Crescent (f<0.5): dark ellipse painted over the lit semicircle on the lit side
  // Gibbous  (f>0.5): lit  ellipse painted over the dark side
  if(f>0.01){
    const ex=r*Math.abs(1-2*f);
    // 1. Lit semicircle
    ctx.fillStyle=moonColor;
    ctx.beginPath();ctx.moveTo(px,py);
    if(waxing) ctx.arc(px,py,r,-Math.PI/2, Math.PI/2,false); // right half CW
    else       ctx.arc(px,py,r, Math.PI/2,-Math.PI/2,false); // left  half CW
    ctx.closePath();ctx.fill();
    // 2. Terminator ellipse overlay
    if(f<0.5){
      // Crescent: dark half-ellipse on the lit side trims it back
      ctx.fillStyle='#060e24';
      ctx.beginPath();ctx.moveTo(px,py);
      if(waxing) ctx.ellipse(px,py,ex,r,0,-Math.PI/2, Math.PI/2,false); // right CW
      else       ctx.ellipse(px,py,ex,r,0,-Math.PI/2, Math.PI/2,true);  // left  CCW
      ctx.closePath();ctx.fill();
    }else if(f<0.99){
      // Gibbous: lit half-ellipse on the dark side extends lit area
      ctx.fillStyle=moonColor;
      ctx.beginPath();ctx.moveTo(px,py);
      if(waxing) ctx.ellipse(px,py,ex,r,0,-Math.PI/2, Math.PI/2,true);  // left  CCW
      else       ctx.ellipse(px,py,ex,r,0,-Math.PI/2, Math.PI/2,false); // right CW
      ctx.closePath();ctx.fill();
    }else{
      // Full: fill the other semicircle too
      ctx.fillStyle=moonColor;
      ctx.beginPath();ctx.moveTo(px,py);
      if(waxing) ctx.arc(px,py,r,Math.PI/2,-Math.PI/2,false);
      else       ctx.arc(px,py,r,-Math.PI/2,Math.PI/2,false);
      ctx.closePath();ctx.fill();
    }
  }

  ctx.restore();

  if(show.labels){
    const labelColor=eclipseA>0?'rgba(255,180,100,0.85)':'rgba(200,220,255,0.7)';
    ctx.fillStyle=labelColor;ctx.font='10px Cinzel, serif';
    ctx.fillText(eclipseA>0?'Moon (Eclipse)':'Moon',px+r+3,py-r);
  }
}

function drawHighlights(hl,t){
  hl.forEach(name=>{
    let pos;
    if(name==='virgo'){pos=sky(12.9,2.0)} // center of Virgo
    else if(name==='regulus'){const rs=CONST_LEO.stars.find(s=>s.name==='Regulus');pos=rs?{x:rs.x,y:rs.y}:null}
    else{
      if((name==='sun'&&!show.sun)||(name==='moon'&&!show.moon)||
        (['jupiter','venus','mercury','mars'].includes(name)&&!show.planets))return;
      pos=getPos(name,t);
    }
    if(!pos||!inFrame(pos))return;
    const px=pos.x*W,py=pos.y*H;
    ctx.save();ctx.beginPath();ctx.arc(px,py,28,0,Math.PI*2);
    ctx.strokeStyle='rgba(240,192,96,0.4)';ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);ctx.lineDashOffset=-(Date.now()*0.001%6.28)*10;
    ctx.stroke();ctx.setLineDash([]);ctx.restore();
  });
}

function drawConjLine(n1,n2,t,col){
  if(!show.planets)return;
  const p1=getPos(n1,t),p2=getPos(n2,t);
  if(!inFrame(p1)||!inFrame(p2))return;
  const dx=(p2.x-p1.x)*W,dy=(p2.y-p1.y)*H;
  const d=Math.sqrt(dx*dx+dy*dy);if(d>80)return;
  const a=1-d/80;
  ctx.save();ctx.beginPath();ctx.moveTo(p1.x*W,p1.y*H);ctx.lineTo(p2.x*W,p2.y*H);
  ctx.strokeStyle=col||`rgba(240,192,96,${a*0.6})`;ctx.lineWidth=1+a*2;ctx.stroke();ctx.restore();
}

function getEventAtT(t){let c=EVENTS[0];for(let i=0;i<EVENTS.length;i++)if(t>=EVENTS[i].t)c=EVENTS[i];return c}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function render(t){
  ctx.clearRect(0,0,W,H);
  drawBg();

  // Ecliptic (behind everything)
  drawEcliptic();

  // Constellation lines + stars
  ALL_C.forEach(c=>drawConst(c,1));

  // Conjunction lines
  drawConjLine('jupiter','venus',t,'rgba(255,220,80,0.5)');
  drawConjLine('jupiter','mercury',t,'rgba(200,220,255,0.4)');
  drawConjLine('venus','mercury',t,'rgba(255,180,220,0.4)');
  drawConjLine('jupiter','mars',t,'rgba(255,120,80,0.3)');

  // Celestial bodies
  drawSun(t);
  drawPlanet('venus',t,{color:'#ff9adc',r:7,glowColor:'rgba(255,154,220,0.4)',glowR:28,label:'Venus'});
  drawPlanet('mercury',t,{color:'#a0c8ff',r:5,glowColor:'rgba(160,200,255,0.3)',glowR:20,label:'Mercury'});
  drawPlanet('mars',t,{color:'#ff6644',r:6,glowColor:'rgba(255,100,68,0.35)',glowR:22,label:'Mars'});
  drawPlanet('jupiter',t,{color:'#ffd700',r:11,glowColor:'rgba(255,215,0,0.5)',glowR:36,label:'Jupiter'});
  drawMoon(t);

  // Highlights
  const ev=getEventAtT(t);
  if(ev&&ev.highlight)drawHighlights(ev.highlight,t);

  // Moon–Regulus occultation glow (t≈327, 24–25 Nov 3 BC)
  if(t>=307&&t<=347&&show.moon){
    const moonPos=getPos('moon',t);
    const regStar=CONST_LEO.stars.find(s=>s.name==='Regulus');
    if(moonPos&&regStar&&inFrame(moonPos)){
      const dx=(regStar.x-moonPos.x)*W,dy=(regStar.y-moonPos.y)*H;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const fade=Math.max(0,1-Math.abs(t-327)/15);
      const prox=Math.max(0,1-dist/70);
      const a=fade*prox;
      if(a>0.01){
        // line connecting moon to regulus
        ctx.save();
        ctx.beginPath();ctx.moveTo(moonPos.x*W,moonPos.y*H);ctx.lineTo(regStar.x*W,regStar.y*H);
        ctx.strokeStyle=`rgba(200,220,255,${a*0.5})`;ctx.lineWidth=1+a*2;ctx.stroke();
        // glow around regulus
        const rg=ctx.createRadialGradient(regStar.x*W,regStar.y*H,0,regStar.x*W,regStar.y*H,32);
        rg.addColorStop(0,`rgba(200,220,255,${a*0.35})`);rg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=rg;ctx.beginPath();ctx.arc(regStar.x*W,regStar.y*H,32,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    }
  }

  // Jupiter station ring (t≈328, 25 Nov 3 BC)
  if(t>=308&&t<=348&&show.planets){
    const jp=getPos('jupiter',t);
    if(jp&&inFrame(jp)){
      const a=Math.max(0,1-Math.abs(t-328)/15);
      ctx.save();
      ctx.beginPath();ctx.arc(jp.x*W,jp.y*H,22+a*8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,215,0,${a*0.45})`;ctx.lineWidth=1.5;
      ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Sep 11 3 BC special glow (day 253)
  if(t>=233&&t<=273){
    const a=Math.max(0,1-Math.abs(t-253)/20);
    const sp=getPos('sun',t);
    ctx.save();
    const sg=ctx.createRadialGradient(sp.x*W,sp.y*H,0,sp.x*W,sp.y*H,W*.20);
    sg.addColorStop(0,`rgba(255,200,80,${a*0.12})`);sg.addColorStop(1,'rgba(255,200,80,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sp.x*W,sp.y*H,W*.20,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Date overlay
  const dateStr=currentDate(t);
  if(dateStr){
    ctx.save();ctx.fillStyle='rgba(240,192,96,0.92)';ctx.font='600 16px Cinzel, serif';
    ctx.textAlign='right';ctx.fillText(dateStr,W-16,28);ctx.textAlign='left';ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
const slider=document.getElementById('timeline');
const btnPlay=document.getElementById('btn-play');
const speedSlider=document.getElementById('speed');

let currentT=0,playing=false,animId=null,lastTime=null;
let pauseUntil=null,lastPausedEventT=null;

function updatePanel(t){
  const ev=getEventAtT(t);if(!ev)return;
  document.getElementById('ev-date').textContent=ev.date;
  document.getElementById('ev-title').textContent=ev.title;
  document.getElementById('ev-desc').textContent=ev.desc;
  document.querySelectorAll('.ev-item').forEach(el=>{
    el.classList.toggle('active',parseFloat(el.dataset.t)===ev.t);
  });
}

function setT(t){
  currentT=clamp(t,200,737);
  slider.value=currentT;
  slider.style.setProperty('--pct',((currentT-200)/(737-200)*100)+'%');
  updatePanel(currentT);
  render(currentT);
}

function loop(ts){
  if(!playing)return;
  if(!lastTime)lastTime=ts;
  const dt=ts-lastTime;lastTime=ts;

  // honour event pause
  if(pauseUntil!==null){
    if(ts<pauseUntil){animId=requestAnimationFrame(loop);return;}
    pauseUntil=null;lastTime=ts; // reset so resume doesn't jump
  }

  currentT+=dt*parseInt(speedSlider.value)*0.015; // ~1 day/frame at speed 1
  if(currentT>737){currentT=737;playing=false;btnPlay.textContent='\u25B6 PLAY';lastTime=null;}

  // pause 1.5 s on named events we haven't paused at yet; snap to exact event t
  if(playing){
    const ev=getEventAtT(currentT);
    if(ev && ev.t!==lastPausedEventT){
      lastPausedEventT=ev.t;
      currentT=ev.t;
      pauseUntil=ts+1500;
    }
  }

  setT(currentT);

  if(playing)animId=requestAnimationFrame(loop);
}

btnPlay.addEventListener('click',()=>{
  if(playing){playing=false;btnPlay.textContent='\u25B6 PLAY';lastTime=null;cancelAnimationFrame(animId);}
  else{if(currentT>=737)setT(200);playing=true;btnPlay.textContent='\u23F8 PAUSE';lastTime=null;pauseUntil=null;lastPausedEventT=null;animId=requestAnimationFrame(loop);}
});

slider.addEventListener('input',()=>setT(parseInt(slider.value)));

// Build event list
const listEl=document.getElementById('event-list');
EVENTS.forEach(ev=>{
  const d=document.createElement('div');d.className='ev-item';d.dataset.t=ev.t;
  d.innerHTML=`<div class="ei-date">${ev.date}</div><div class="ei-title">${ev.title}</div>`;
  d.addEventListener('click',()=>{
    if(playing){playing=false;btnPlay.textContent='\u25B6 PLAY';cancelAnimationFrame(animId);}
    setT(ev.t);
  });
  listEl.appendChild(d);
});

// Continuous twinkling
function bgLoop(){if(!playing)render(currentT);requestAnimationFrame(bgLoop)}

setT(209);
bgLoop();
</script>
